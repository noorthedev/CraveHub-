<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Cart | CraveHub</title>
<meta name="description" content="Review your CraveHub order before checkout.">
<link rel="icon" href="img/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
<script>document.documentElement.setAttribute('data-theme', localStorage.getItem('ch_theme') || 'dark');</script>
<script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
<style>
  .cart_table{ width:100%; border-collapse:collapse; }
  .cart_table th{ text-align:left; font-size:12px; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); padding-bottom:14px; border-bottom:1px solid var(--border); }
  .cart_table td{ padding:18px 10px; border-bottom:1px solid var(--border); vertical-align:middle; }
  .cart_row_item{ display:flex; align-items:center; gap:16px; }
  .cart_row_item img{ width:64px; height:64px; object-fit:contain; background:var(--surface-2); border-radius:8px; padding:6px; }
  .cart_page_wrap{ display:grid; grid-template-columns:1.6fr 1fr; gap:40px; padding:70px 8% 100px; align-items:start; }
  @media (max-width:900px){ .cart_page_wrap{ grid-template-columns:1fr; } .cart_table{ font-size:13px; } }
</style>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body data-page="cart">

  <div id="loader">
    <div class="loader_logo"><ion-icon name="restaurant"></ion-icon> CraveHub</div>
    <div class="loader_bar"></div>
  </div>

  <div id="site-header"></div>

  <div class="center" style="padding:50px 8% 0;" data-aos="fade-up">
    <span class="eyebrow">Review Order</span>
    <h2 class="section_heading">Your Cart</h2>
    <hr class="section_divider">
  </div>

  <div class="cart_page_wrap">
    <div id="cartPageBody" data-aos="fade-right"></div>
    <div class="order_summary" data-aos="fade-left" id="cartSummary"></div>
  </div>

  <div id="site-footer"></div>
  <div class="scroll_top" id="scrollTopBtn"><ion-icon name="arrow-up"></ion-icon></div>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="js/data.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/wishlist.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/app.js"></script>
  <script src="js/mailer.js"></script>
  <script>
    function renderCartPage() {
      const cart = getCart();
      const body = document.getElementById('cartPageBody');
      const summary = document.getElementById('cartSummary');

      if (cart.length === 0) {
        body.innerHTML = `
          <div class="empty_state">
            <ion-icon name="cart-outline"></ion-icon>
            <p>Your cart is empty.<br>Time to fix that.</p>
            <a href="menu.html" class="btn" style="margin-top:20px;">Browse Menu</a>
          </div>`;
        summary.innerHTML = '';
        return;
      }

      body.innerHTML = `
        <table class="cart_table">
          <thead><tr><th>Item</th><th>Price</th><th>Qty</th><th>Subtotal</th><th></th></tr></thead>
          <tbody>
            ${cart.map(c => {
              const item = getMenuItemById(c.id);
              if (!item) return '';
              return `
                <tr>
                  <td>
                    <div class="cart_row_item">
                      <img src="${item.image}" alt="${item.name}">
                      <span>${item.name}</span>
                    </div>
                  </td>
                  <td>$${item.price.toFixed(2)}</td>
                  <td>
                    <div class="qty_control">
                      <button onclick="changeQty('${item.id}', -1)">−</button>
                      <span>${c.qty}</span>
                      <button onclick="changeQty('${item.id}', 1)">+</button>
                    </div>
                  </td>
                  <td>$${(item.price * c.qty).toFixed(2)}</td>
                  <td><span class="remove_item" onclick="removeFromCart('${item.id}')">Remove</span></td>
                </tr>`;
            }).join('')}
          </tbody>
        </table>`;

      const subtotal = getCartTotal();
      const delivery = subtotal > 0 ? 3.5 : 0;
      const tax = subtotal * 0.05;
      const total = subtotal + delivery + tax;

      summary.innerHTML = `
        <h3 style="margin-bottom:20px; font-size:20px;">Order Summary</h3>
        <div class="summary_row"><span>Subtotal</span><span>$${subtotal.toFixed(2)}</span></div>
        <div class="summary_row"><span>Delivery Fee</span><span>$${delivery.toFixed(2)}</span></div>
        <div class="summary_row"><span>Tax (5%)</span><span>$${tax.toFixed(2)}</span></div>
        <div class="summary_row total"><span>Total</span><span>$${total.toFixed(2)}</span></div>
        <a href="checkout.html" class="btn" style="width:100%; justify-content:center; margin-top:18px;">Proceed to Checkout</a>
      `;
    }
    document.addEventListener('DOMContentLoaded', renderCartPage);
  </script>
</body>
</html>
